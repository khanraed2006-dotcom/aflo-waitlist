<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aflo Nights Waitlist</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #dbdbc8;
      color: #28241e;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }
    h1 {
      letter-spacing: 6px;
      font-size: 42px;
      margin-bottom: 0;
    }
    p.subtitle {
      letter-spacing: 3px;
      font-size: 14px;
      margin-top: 8px;
    }
    #status {
      margin: 30px auto;
      max-width: 400px;
      font-size: 16px;
    }
    #form {
      display: none;
      max-width: 380px;
      margin: 20px auto;
      text-align: left;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 16px 0;
      font-size: 16px;
      border: 1px solid #999;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: inherit;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: #28241e;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
    }
    button:disabled {
      background: #999;
    }
    #denied {
      display: none;
      color: #7a2e2e;
      max-width: 380px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <h1>AFLO</h1>
  <p class="subtitle">N I G H T S</p>

  <div id="status">Checking your location...</div>

  <div id="form">
    <label>Name</label>
    <input type="text" id="name" required>

    <label>Phone Number</label>
    <input type="tel" id="phone" required>

    <label>Party Size</label>
    <select id="partySize">
      <option>1</option>
      <option>2</option>
      <option selected>3</option>
      <option>4</option>
      <option>5</option>
      <option>6+</option>
    </select>

    <button id="submitBtn" onclick="submitForm()">Join Waitlist</button>
  </div>

  <div id="denied">
    <p><strong>Sorry, your location is not within our waiting list coverage area.</strong></p>
    <p>Please be within the coverage area so we can assist you.</p>
  </div>
  <script>
    // PASTE YOUR APPS SCRIPT WEB APP URL BETWEEN THE QUOTES BELOW
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynGgs-JvNBrHXjOnotjJCSiWiMoU_uH6sbzuzh1bWSHBOxYohsczw6h8VptxUTpYKS/exec";

    let userLat, userLng;

    function checkLocation() {
      if (!navigator.geolocation) {
        document.getElementById('status').innerText = 'Location not supported on this device.';
        return;
      }
      navigator.geolocation.getCurrentPosition(function(position) {
        userLat = position.coords.latitude;
        userLng = position.coords.longitude;
        document.getElementById('status').innerText = 'Verifying...';

        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'check', lat: userLat, lng: userLng })
        })
        .then(res => res.json())
        .then(result => {
          if (result.allowed) {
            document.getElementById('status').style.display = 'none';
            document.getElementById('form').style.display = 'block';
          } else {
            document.getElementById('status').style.display = 'none';
            document.getElementById('denied').style.display = 'block';
          }
        })
        .catch(err => {
          document.getElementById('status').innerText = 'Error checking location. Please try again.';
        });

      }, function(error) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('denied').style.display = 'block';
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function submitForm() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const partySize = document.getElementById('partySize').value;

      if (!name || !phone) {
        alert('Please fill in your name and phone number.');
        return;
      }

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').innerText = 'Submitting...';

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'submit',
          name: name,
          phone: phone,
          partySize: partySize,
          lat: userLat,
          lng: userLng
        })
      })
      .then(res => res.json())
      .then(result => {
        if (result.success) {
         document.getElementById('form').innerHTML =
  '<p style="text-align:center;">You\'re on the list! 🎉<br>Please be present within 10 minutes of being contacted, otherwise your table reservation will be cancelled and made available to other customers. Thank you for your understanding.</p>';
        } else {
          alert('Something went wrong. Please try again or ask a staff member.');
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('submitBtn').innerText = 'Join Waitlist';
        }
      })
      .catch(err => {
        alert('Something went wrong. Please try again or ask a staff member.');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerText = 'Join Waitlist';
      });
    }

    checkLocation();
  </script>
</body>
</html>
